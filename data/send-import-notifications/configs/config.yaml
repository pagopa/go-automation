# SEND Import Notifications Configuration
#
# Default configuration for importing notifications from CSV
# Override these values using environment variables or CLI arguments

# CSV Files
# For Docker: Use absolute path in container: /app/data/send-import-notifications/inputs/file.csv
# For local: Use relative path from script directory: ../../../data/send-import-notifications/inputs/file.csv
csv:
  file: ../../../data/send-import-notifications/inputs/Test.csv  # Absolute path for Docker
export:
  file: notifications-exported.csv

# PN API Configuration
base:
  path: api.test.notifichedigitali.it

send:
  notifications: true  # Set to true to actually send notifications (false = dry-run)

# Workflow Options
concurrency: 10          # Number of notifications to process in parallel

# --- Polling Options
# Send rate limit 60 request/second (as per PN API limits)
limiter:
  rate:
    requests: 5        # Maximum number of requests
    perSeconds: 1      # Per time window in seconds
# --- Polling Options

poll:
  for:
    iun: true           # Poll for IUN after sending
  max:
    attempts: 30        # Maximum polling attempts
  delay:
    ms: 60000           # In milliseconds between polling attempts
# Streaming Options
streamingThresholdMb: 10  # File size threshold for streaming mode (MB)

# Debugging Options (optional)
# proxy:
#   url: http://127.0.0.1:9090  # HTTP proxy for debugging (uncomment to enable)
