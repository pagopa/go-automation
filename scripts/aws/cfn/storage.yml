AWSTemplateFormatVersion: '2010-09-09'
Description: Go Automation storage with input and output

Parameters:
  # Unused but required by CD pipeline
  TemplateBucketBaseUrl:
    Type: String
    Description: URL da cui caricare i frammenti di template di infrastruttura
  
  LogRetention:
    Type: Number
    Default: 14
    Description: 'Number of days to retain logs in CloudWatch.'

Resources:
  GoSendMonitorTppMessagesLambdaLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain    
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/log-group.yaml"
      Parameters:
        LogGroupName: go-SendMonitorTppMessagesLambda
        LogGroupPrefix: '/aws/lambda'
        LogGroupRetention: !Ref LogRetention

  # Create GoReportBucket s3
  GoReportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "go-report-bucket-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  GoReportBucketName:
    Value: !Ref GoReportBucket
  GoSendMonitorTppMessagesLambdaName:
    Value: go-SendMonitorTppMessagesLambda