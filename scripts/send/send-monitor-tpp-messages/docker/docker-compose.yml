# =============================================================================
# Docker Compose - send-monitor-tpp-messages
# =============================================================================
#
# Monitors TPP messages via Athena queries and sends reports to Slack.
#
# Prerequisites:
#   1. Build the image:
#      ./bins/build-image.sh send-monitor-tpp-messages latest
#
#   2. Create .env file:
#      cp .env.example .env
#      # Edit .env with your values
#
# Usage:
#   Interactive (single run):
#     docker compose run --rm app
#     docker compose run --rm app --from 2025-01-01 --to 2025-01-15
#
#   Scheduled (cron - container always running):
#     docker compose --profile scheduled up -d
#     docker compose --profile scheduled logs -f
#     docker compose --profile scheduled down
#
#   Using helper script:
#     ./bins/docker-run.sh send-monitor-tpp-messages run
#     ./bins/docker-run.sh send-monitor-tpp-messages up --scheduled
#     ./bins/docker-run.sh send-monitor-tpp-messages logs -f --scheduled
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Interactive Service (RUN_MODE=once)
  # ---------------------------------------------------------------------------
  # Use for manual, single execution runs
  app:
    image: go-automation/send-monitor-tpp-messages:${IMAGE_TAG:-latest}
    container_name: send-monitor-tpp-messages

    env_file:
      - .env

    environment:
      # Execution mode
      RUN_MODE: once
      NODE_ENV: production
      TZ: ${TZ:-Europe/Rome}

    volumes:
      # Reports output directory
      - ../reports:/app/reports:rw

      # Optional: Override config.yaml
      # - ../configs/config.yaml:/app/configs/config.yaml:ro

      # Optional: AWS credentials for SSO (local development)
      - ~/.aws:/home/gouser/.aws:ro

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

    restart: "no"

  # ---------------------------------------------------------------------------
  # Scheduled Service (RUN_MODE=cron)
  # ---------------------------------------------------------------------------
  # Runs on schedule: 09:00, 11:00, 15:00, 17:00 daily
  # Activate with: docker compose --profile scheduled up -d
  # Uses Node.js croner for scheduling - no root required
  scheduled:
    image: go-automation/send-monitor-tpp-messages:${IMAGE_TAG:-latest}
    container_name: send-monitor-tpp-messages-cron

    env_file:
      - .env

    environment:
      # Cron execution mode (uses Node.js croner scheduler)
      RUN_MODE: cron
      CRON_SCHEDULE: ${CRON_SCHEDULE:-20 17 * * *}
      NODE_ENV: production
      TZ: ${TZ:-Europe/Rome}

    volumes:
      - ../reports:/app/reports:rw
      # AWS credentials for SSO (local development)
      - ~/.aws:/home/gouser/.aws:ro

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

    # Container always running for cron
    restart: unless-stopped

    # Only activated with --profile scheduled
    profiles:
      - scheduled

    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
