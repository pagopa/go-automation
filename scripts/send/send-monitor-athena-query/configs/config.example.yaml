from:
to:

time:
  lookback:
    hours: 24
  zone: Europe/Rome

aws:
  profile: sso_pn-core-prod
  region: eu-south-1

athena:
  database: pn_analytics
  catalog: AwsDataCatalog
  workgroup: primary
  output:
    location: s3://my-athena-results/monitor/
  max:
    poll:
      attempts: 60
  poll:
    interval:
      ms: 5000
  query: |
    SELECT
      status,
      count(*) AS total
    FROM {{raw.tableName}}
    WHERE event_time >= {{range.start.dateTime}}
      AND event_time < {{range.end.dateTime}}
    GROUP BY status
    ORDER BY total DESC

template:
  params: []
  raw:
    - tableName=analytics.events
  legacy:
    aliases: true

output:
  folder: reports
  format: csv
  file:
    prefix: athena-report
  attach:
    when:
      empty: false

artifact:
  s3:
    location:

slack:
  token:
  channel:
  send:
    on:
      empty: true
      error: true
  message:
    template: |
      *Athena monitor report*

      *Range:* {{startDate}} - {{endDate}}
      *Rows:* {{rowCount}}
      *Analysis:* {{analysis}}
      *Artifact:* {{fileName}}

analysis:
  rules:
    - name=high-volume;field=total;operator=>;value=100;aggregation=any-row;severity=warning
  threshold:
    field:
