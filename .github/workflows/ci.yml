name: CI

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    uses: ./.github/workflows/ci-job.yml
    with:
      command: type-check

  lint:
    name: Lint
    uses: ./.github/workflows/ci-job.yml
    with:
      command: lint

  format:
    name: Format Check
    uses: ./.github/workflows/ci-job.yml
    with:
      command: format:check

  knip:
    name: Unused Code
    uses: ./.github/workflows/ci-job.yml
    with:
      command: knip

  build:
    name: Build
    uses: ./.github/workflows/ci-job.yml
    with:
      command: build

  test:
    name: Test
    uses: ./.github/workflows/ci-job.yml
    with:
      pre-command: build
      command: test

  # Summary job for branch protection
  ci-success:
    name: CI Success
    needs: [typecheck, lint, format, knip, build, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=("${{ needs.typecheck.result }}" "${{ needs.lint.result }}" "${{ needs.format.result }}" "${{ needs.knip.result }}" "${{ needs.build.result }}" "${{ needs.test.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "One or more checks failed"
              exit 1
            fi
          done
          echo "All checks passed!"
