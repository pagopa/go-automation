name: CI

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

  merge_group:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    uses: ./.github/workflows/ci-job.yml
    with:
      command: type-check

  lint:
    name: Lint
    uses: ./.github/workflows/ci-job.yml
    with:
      command: lint

  format:
    name: Format Check
    uses: ./.github/workflows/ci-job.yml
    with:
      command: format:check
      install-args: --frozen-lockfile --ignore-scripts

  knip:
    name: Unused Code
    uses: ./.github/workflows/ci-job.yml
    with:
      command: knip
      install-args: --frozen-lockfile --ignore-scripts

  scaffold:
    name: Scaffold Validation
    uses: ./.github/workflows/ci-job.yml
    with:
      command: validate:scaffold
      install-args: --frozen-lockfile --ignore-scripts

  new-class-tests:
    name: New Class Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci
        with:
          install-args: --frozen-lockfile --ignore-scripts

      - name: Test new class test checker
        run: pnpm check:new-class-tests:test

      - name: Check new class tests
        if: github.event_name == 'pull_request'
        run: pnpm check:new-class-tests --base origin/${{ github.base_ref }}

      - name: Skip outside pull requests
        if: github.event_name != 'pull_request'
        run: echo "New class test enforcement only runs on pull_request events."

  build:
    name: Build
    uses: ./.github/workflows/ci-job.yml
    with:
      command: build
      install-args: --frozen-lockfile --ignore-scripts
      timeout-minutes: 25
      upload-artifact-name: workspace-build
      upload-artifact-path: |
        packages/**/dist
        packages/**/*.tsbuildinfo
        scripts/**/dist
        scripts/**/*.tsbuildinfo

  test:
    name: Test
    needs: build
    uses: ./.github/workflows/ci-job.yml
    with:
      command: test
      install-args: --frozen-lockfile --ignore-scripts
      timeout-minutes: 25
      download-artifact-name: workspace-build

  coverage:
    name: Coverage
    needs: build
    uses: ./.github/workflows/ci-job.yml
    with:
      command: test:coverage
      install-args: --frozen-lockfile --ignore-scripts
      timeout-minutes: 25
      download-artifact-name: workspace-build
      upload-artifact-name: coverage-reports
      upload-artifact-path: |
        packages/**/coverage/lcov.info
        scripts/**/coverage/lcov.info
      coverage-lines-threshold: '90'
      coverage-branches-threshold: '80'
      coverage-functions-threshold: '90'

  macos-smoke:
    name: macOS Smoke
    uses: ./.github/workflows/ci-job.yml
    with:
      runner: macos-latest
      timeout-minutes: 25
      command: build:common
      install-args: --frozen-lockfile --ignore-scripts

  # Summary job for branch protection
  ci-success:
    name: CI Success
    needs: [typecheck, lint, format, knip, scaffold, new-class-tests, build, test, coverage, macos-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=("${{ needs.typecheck.result }}" "${{ needs.lint.result }}" "${{ needs.format.result }}" "${{ needs.knip.result }}" "${{ needs.scaffold.result }}" "${{ needs.new-class-tests.result }}" "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.coverage.result }}" "${{ needs.macos-smoke.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "One or more checks failed"
              exit 1
            fi
          done
          echo "All checks passed!"
