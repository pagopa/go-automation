name: Security Audit

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**/package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**/package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci
        with:
          install-args: --frozen-lockfile --ignore-scripts

      - name: Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run security audit (strict)
        id: audit-strict
        run: pnpm audit --audit-level=critical

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci
        with:
          install-args: --frozen-lockfile --ignore-scripts

      - name: Check licenses
        run: pnpm license:check
