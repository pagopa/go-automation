name: "GO Automation CodeQL Config"

paths-ignore:
  # Test fixtures contain intentionally non-standard files
  - "**/__fixtures__/**"

query-filters:
  # GOHttpClient is a general-purpose HTTP client — sending request bodies is its intended behavior.
  # CodeQL flags this as "file data in outbound network request" but it's a false positive.
  - exclude:
      id: js/file-access-to-http
      paths:
        - packages/go-common/src/libs/core/network/GOHttpClient.ts
